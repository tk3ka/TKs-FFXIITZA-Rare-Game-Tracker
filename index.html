      --line: rgba(255, 237, 245, .12);
      --accent: #f2c14e;
      --good: #ee8bc7;
      --gold: #f2c14e;
      --pink: #ee8bc7;
      --shadow: 0 12px 30px rgba(0,0,0,.35);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(242,193,78,.16), transparent 32rem), radial-gradient(circle at top right, rgba(238,139,199,.12), transparent 30rem), linear-gradient(180deg, #120f17 0%, #09070d 100%);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app { width: min(100%, 760px); margin: 0 auto; padding: 16px; }
    header {
      position: sticky; top: 0; z-index: 10; margin: 0 -16px 14px;
      padding: max(12px, env(safe-area-inset-top)) 16px 12px;
      background: rgba(18,15,23,.94); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line);
    }
    h1 { font-size: clamp(1.25rem, 5vw, 2rem); line-height: 1.05; margin: 0; letter-spacing: -.02em; }
    .subtitle { margin: 5px 0 0; color: var(--muted); font-size: .92rem; }
    .progress-wrap { margin-top: 12px; display: grid; gap: 8px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: .9rem; }
    .bar { height: 12px; border-radius: 999px; background: rgba(255,255,255,.1); overflow: hidden; border: 1px solid rgba(255,255,255,.08); }
    .bar > span { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--good)); transition: width .2s ease; box-shadow: 0 0 18px rgba(242,193,78,.25); }
    .controls { display: grid; gap: 10px; margin: 14px 0 16px; }
    .search { width: 100%; border: 1px solid var(--line); border-radius: 14px; padding: 14px; font-size: 1rem; color: var(--text); background: rgba(255,255,255,.08); outline: none; }
    .search::placeholder { color: #bca9b8; }
    .filters, .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    button { border: 1px solid var(--line); border-radius: 14px; padding: 12px 10px; font-weight: 750; color: var(--text); background: rgba(255,255,255,.08); min-height: 44px; cursor: pointer; touch-action: manipulation; }
    button.active { background: rgba(242,193,78,.18); border-color: rgba(242,193,78,.65); color: #fff4d1; }
    button.danger { color: #fecaca; }
    .section { margin: 14px 0; border: 1px solid var(--line); border-radius: var(--radius); background: rgba(27,22,36,.86); box-shadow: var(--shadow); overflow: hidden; }
    .section-header { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px; background: linear-gradient(180deg, rgba(242,193,78,.14), rgba(238,139,199,.06)); text-align: left; border: 0; border-bottom: 1px solid var(--line); border-radius: 0; }
    .section-title { font-size: 1rem; font-weight: 850; line-height: 1.15; }
    .section-count { flex: 0 0 auto; color: var(--muted); font-size: .86rem; font-weight: 700; }
    .games { display: grid; }
    .game { display: grid; grid-template-columns: 48px 1fr; gap: 10px; align-items: start; padding: 13px 14px; border-bottom: 1px solid rgba(255,255,255,.08); background: rgba(18,15,23,.40); }
    .game:nth-child(even) { background: rgba(255,255,255,.025); }
    .game:last-child { border-bottom: 0; }
    .game input { width: 29px; height: 29px; margin: 3px auto 0; accent-color: var(--good); }
    .game-main { min-width: 0; }
    .top-line { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .order { display: inline-flex; align-items: center; justify-content: center; min-width: 2.1rem; height: 1.55rem; padding: 0 7px; border-radius: 999px; background: rgba(242,193,78,.14); color: #ffe8a3; font-weight: 800; font-size: .78rem; border: 1px solid rgba(242,193,78,.28); }
    .name-btn { display: inline; border: 0; background: transparent; padding: 2px 0; min-height: 0; border-radius: 6px; color: var(--text); font-size: 1.06rem; font-weight: 850; letter-spacing: -.01em; text-align: left; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px; }
    .name-btn:after { content: "  ▾"; color: var(--good); font-size: .78rem; }
    .game.expanded .name-btn:after { content: "  ▴"; }
    .badge { color: #ffe8a3; background: rgba(242,193,78,.14); border: 1px solid rgba(242,193,78,.35); border-radius: 999px; padding: 2px 7px; font-size: .72rem; font-weight: 850; }
    .location { margin-top: 4px; color: var(--muted); font-size: .92rem; line-height: 1.35; }
    .tap-hint { margin-top: 4px; color: #f2aad4; font-size: .8rem; }
    .condition { margin-top: 10px; padding: 11px 12px; border: 1px solid rgba(242,193,78,.24); border-radius: 14px; background: linear-gradient(180deg, rgba(242,193,78,.10), rgba(238,139,199,.08)); line-height: 1.42; }
    .condition-title { display: block; color: #ffd978; font-size: .78rem; font-weight: 900; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .checked .name-btn { text-decoration: line-through; color: #ffd5eb; }
    .checked .location { color: #ad9dab; }
    .empty { margin: 22px 0; padding: 20px; border-radius: var(--radius); border: 1px dashed var(--line); color: var(--muted); text-align: center; }
    .note { color: var(--muted); font-size: .86rem; line-height: 1.4; margin: 18px 2px 4px; }
    @media (min-width: 640px) { .game { grid-template-columns: 54px 1fr; } }
  </style>

const STORAGE_KEY = "ffxii-ue-rare-game-found-v2";
const COLLAPSE_KEY = "ffxii-ue-rare-game-collapsed-v2";
let found = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));
let collapsed = new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY) || "[]"));
let expanded = new Set();
let filter = "all";
let query = "";
const total = sections.reduce((sum, section) => sum + section.games.length, 0);
const list = document.getElementById("list");
const search = document.getElementById("search");
const progressText = document.getElementById("progressText");
const percentText = document.getElementById("percentText");
const progressBar = document.getElementById("progressBar");
function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, char => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[char]));
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...found]));
  localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...collapsed]));
}
function matchesGame(game) {
  const isFound = found.has(game.order);
  if (filter === "found" && !isFound) return false;
  if (filter === "open" && isFound) return false;
  if (!query) return true;
  const haystack = `${game.order} ${game.name} ${game.location} ${game.condition}`.toLowerCase();
  return haystack.includes(query.toLowerCase());
}
function updateProgress() {
  const count = found.size;
  const pct = Math.round((count / total) * 100);
  progressText.textContent = `${count} of ${total} found`;
  percentText.textContent = `${pct}%`;
  progressBar.style.width = `${pct}%`;
}
function render() {
  updateProgress();
  list.innerHTML = "";
  let visibleTotal = 0;
  sections.forEach((section, sectionIndex) => {
    const visibleGames = section.games.filter(matchesGame);
    if (!visibleGames.length) return;
    visibleTotal += visibleGames.length;
    const sectionFound = section.games.filter(game => found.has(game.order)).length;
    const wrap = document.createElement("section");
    wrap.className = "section";
    const header = document.createElement("button");
    header.className = "section-header";
    header.type = "button";
    header.innerHTML = `<span class="section-title">${escapeHtml(section.title)}</span><span class="section-count">${sectionFound}/${section.games.length} ${collapsed.has(sectionIndex) ? "+" : "-"}</span>`;
    header.addEventListener("click", () => {
      if (collapsed.has(sectionIndex)) collapsed.delete(sectionIndex); else collapsed.add(sectionIndex);
      save(); render();
    });
    wrap.appendChild(header);
    if (!collapsed.has(sectionIndex)) {
      const games = document.createElement("div");
      games.className = "games";
      visibleGames.forEach(game => {
        const row = document.createElement("div");
        const isExpanded = expanded.has(game.order);
        row.className = `game ${found.has(game.order) ? "checked" : ""} ${isExpanded ? "expanded" : ""}`;
        row.innerHTML = `
          <input type="checkbox" ${found.has(game.order) ? "checked" : ""} aria-label="Mark ${escapeHtml(game.name)} found" />
          <div class="game-main">
            <div class="top-line">
              <span class="order">${game.order}</span>
              <button class="name-btn" type="button" aria-expanded="${isExpanded}">${escapeHtml(game.name)}</button>
              ${game.trophy ? '<span class="badge">Trophy</span>' : ''}
            </div>
            <div class="location">${escapeHtml(game.location)}</div>
            ${isExpanded ? `<div class="condition"><span class="condition-title">Spawn Condition</span>${escapeHtml(game.condition)}</div>` : '<div class="tap-hint">Tap name for spawn condition</div>'}
          </div>`;
        row.querySelector("input").addEventListener("change", event => {
          if (event.target.checked) found.add(game.order); else found.delete(game.order);
          save(); render();
        });
        row.querySelector(".name-btn").addEventListener("click", () => {
          if (expanded.has(game.order)) expanded.delete(game.order); else expanded.add(game.order);
          render();
        });
        games.appendChild(row);
      });
      wrap.appendChild(games);
    }
    list.appendChild(wrap);
  });
  if (!visibleTotal) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No rare game match your search or filter.";
    list.appendChild(empty);
  }
}
function setFilter(next) {
  filter = next;
  document.querySelectorAll(".filters button").forEach(btn => btn.classList.remove("active"));
  document.getElementById(next === "all" ? "filterAll" : next === "open" ? "filterOpen" : "filterFound").classList.add("active");
  render();
}
document.getElementById("filterAll").addEventListener("click", () => setFilter("all"));
document.getElementById("filterOpen").addEventListener("click", () => setFilter("open"));
document.getElementById("filterFound").addEventListener("click", () => setFilter("found"));
document.getElementById("expandAll").addEventListener("click", () => { collapsed.clear(); save(); render(); });
document.getElementById("collapseAll").addEventListener("click", () => { collapsed = new Set(sections.map((_, index) => index)); save(); render(); });
document.getElementById("reset").addEventListener("click", () => { if (confirm("Clear all checked rare game?")) { found.clear(); save(); render(); } });
search.addEventListener("input", event => { query = event.target.value.trim(); render(); });
render();
</script>
